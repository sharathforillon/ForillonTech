<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>Forillon Technologies - Trusted to Transform</title>
    <meta name="description" content="Forillon Technologies provides enterprise-grade digital transformation, AI consulting, and scalable infrastructure solutions. Trusted to transform your business with intelligent technology." />
    
    <!-- Open Graph -->
    <meta property="og:title" content="Forillon Technologies - Trusted to Transform" />
    <meta property="og:description" content="Enterprise-grade digital transformation and AI consulting services. Build intelligent, scalable digital infrastructure for the future." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://forillon.tech" />
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Netlify CMS -->
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    
    <!-- Netlify Identity -->
    <script>
      if (window.netlifyIdentity) {
        window.netlifyIdentity.on("init", user => {
          if (!user) {
            window.netlifyIdentity.on("login", () => {
              document.location.href = "/admin/";
            });
          }
        });
      }
    </script>
    
    <!-- This is a replit script which adds a banner on the top of the page when opened in development mode outside the replit environment -->
    <script type="text/javascript" src="https://replit.com/public/js/replit-dev-banner.js"></script>
  </body>
</html>
